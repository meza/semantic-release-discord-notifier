name: Verify PR

permissions:
  issues: write
  checks: write
  contents: write
  pull-requests: write
  id-token: write

on:
  push:
  pull_request:
  merge_group:

jobs:
  build:
    name: 🧪 Verify
    runs-on: meza-ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📝 Set up node
        uses: meza/action-setup-node-pnpm@71aff4165b6066ca9cc0748cb0859786b78bf35f # main
        with:
          install: true

      - name: 🔬 Lint
        run: pnpm lint:ci

      - name: 🧪 Test
        run: pnpm test

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2.24.0
        with:
          files: reports/junit.xml

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          format: markdown
          output: file
          hide_complexity: false
          badge: true
          filename: reports/coverage/unit/cobertura-coverage.xml

      - name: Publish code coverage report
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        with:
          recreate: true
          path: code-coverage-results.md

      - name: 📦 Build
        run: pnpm build

      - name: Semantic Release
        run: pnpm release
        env:
          GITHUB_TOKEN: ${{ github.token }}
